<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!--  تصغير الشاشة على الجوال -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>تسجيل دخول للدليل النظام المحاسبي اودو</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="short icon" href="exo2.png" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "IBM Plex Sans Arabic", sans-serif;
      }

      body {
        background-color: #f4f4f4;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url(exo1.png);
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        overflow: hidden;
      }

      @keyframes grodientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .login-container {
        position: relative;
        width: 400px;
        padding: 40px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
        z-index: 10;
        overflow: hidden;
      }

      .login-container::before {
        content: "";
        position: absolute;
        top: 0%;
        left: -100%;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.5);
        transform: skewX(-15deg);
        transition: 0.5s;
        pointer-events: none;
      }
      .login-container:hover::before {
        left: 120%;
      }
      .login-container h2 {
        color: #2f2f2f;
        font-size: 28px;
        font-weight: 600;
        text-align: center;
        letter-spacing: 1px;
        margin-bottom: 40px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      }

      .input-group {
        position: relative;
        margin-bottom: 30px;
      }

      .input-group input {
        width: 100%;
        padding: 15px 20px;
        border: none;
        border-radius: 35px;
        background-color: rgba(255, 255, 255, 0.2);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        outline: none;
        font-size: 16px;
        color: #333;
        transition: all 0.3s ease;
      }

      .input-group input::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }
      .input-group input:focus {
        background-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      .input-group label {
        position: absolute;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        color: #333;
        font-size: 16px;
        pointer-events: none;
        transition: all 0.3s ease;
      }
      .input-group input:focus + label,
      .input-group input:valid + label {
        top: 0;
        left: 15px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.2);
        padding: 2px 8px;
        border-radius: 10px;
        color: #333;
      }
      button {
        background: #ffffff93;
        color: #3498db;
        margin-right: 50px;
        font-size: 18px;
        padding: 8px 80px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 700;
        position: relative;
        overflow: hidden;
        display: inline-block;
        z-index: 1;
        border: none;
        transition: color 0.3s ease;
      }

      /* الطبقة المتحركة */
      button::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 100%;
        background: #3498db;
        z-index: -1;
        transition: 0.3s ease;
      }

      /* عند المرور */
      button:hover {
        color: #fff;
      }

      /* تمدد اللون */
      button:hover::before {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <h2>دخول الموظفين</h2>

      <div class="input-group">
        <input type="password" id="pass" required />
        <label for="password">أدخل الرقم السري</label>
      </div>

      <button class=".btn" onclick="check()">دخول</button>
    </div>

    <script>
      // لو مسجل دخول يرجعه للرئيسية
      if (localStorage.getItem("auth") === "true") {
        window.location.href = "index.html";
      }

      function check() {
        const password = document.getElementById("pass").value;

        if (password === "1234") {
          localStorage.setItem("auth", "true");
          window.location.href = "index.html";
        } else {
          alert("❌ الرقم السري غير صحيح");
        }
      }
    </script>
  </body>
</html>
