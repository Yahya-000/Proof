<!doctype html>

<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>دليل النظام المحاسبي اودو</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="short icon" href="exo2.png" />
  </head>
  <body>
    <section class="dots-container" id="global-loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </section>

    <header class="hero">
      <!-- <button id="darkToggle" class="dark-btn">🌙</button> -->
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <img src="exo2.png" alt="شعار الشركة" class="logo" />

      <h1>دليل النظام المحاسبي Odoo</h1>
      <p>شرح مبسّط للأعمال اليومية لموظفي الشركة خطوة بخطوة</p>
      <a href="operations.html" class="btn">ابدأ الآن</a>
    </header>
    <section class="features">
      <div class="feature">🎥 شروحات فيديو</div>
      <div class="feature">📝 خطوات واضحة</div>
      <div class="feature">⚠️ أخطاء شائعة</div>
    </section>
    <button class="back" onclick="logout()">تسجيل خروج</button>
    <footer>جميع الحقوق محفوظة لشركة العيسائي اكسو التجارية © 2026</footer>

    <button class="back" onclick="logout()">تسجيل خروج</button>
    <script src="assets/js/main.js"></script>
    <!-- loading -->
    <script>
      function handleLoader() {
        const loader = document.getElementById("global-loader");

        if (loader) {
          // ننتظر ثانية واحدة (1000ms)
          setTimeout(() => {
            loader.style.opacity = "0"; // يبدأ بالتلاشي

            // ننتظر انتهاء الأنميشن (0.4 ثانية) ثم نخفيه تماماً من المتصفح
            setTimeout(() => {
              loader.style.display = "none";
            }, 400);
          }, 500);
        }
      }

      // السطر الأهم: تشغيل الدالة فور تحميل نافذة المتصفح
      window.addEventListener("load", handleLoader);

      // إضافة احتياطية: لو استخدمت زر "الرجوع" في المتصفح يختفي أيضاً
      window.addEventListener("pageshow", (event) => {
        if (event.persisted) {
          handleLoader();
        }
      });
    </script>
  </body>
</html>
